<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="/styles/styles.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar navbar-dark bg-dark">
        <a class="navbar-brand" href="#">ZN|Budget</a>
        <div id="authButtons" class="ms-auto d-flex gap-2">
            <div class="ms-auto d-flex gap-2">
                <a href="/register.html" class="btn btn-outline-light">
                    Register
                </a>
                <div class="ms-auto">
                    <a href="/login.html" class="btn btn-outline-light">
                        Login
                    </a>
                </div>
            </div>
    </nav>
    <div class="loginContainer" >
    <div class="loginBackground">
    <div class = "login">
  <h2>Login</h2>

  <div class="loginForms">
    <label>Username</label>
    <input id="username" class="form-control" />
  </div>

  <div class="loginForms">
    <label>Password</label>
    <input id="password" type="password" class="form-control" />
  </div>

  <button class="btn btn-dark loginButton" onclick="login()">Login</button>

  <p id="msg" class="mt-3 text-danger"></p>

  </div>

  </div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          document.getElementById('msg').innerText = data.error;
          return;
        }

        localStorage.setItem('token', data.token);

        window.location.href = '/';

      } catch (err) {
        document.getElementById('msg').innerText = 'Server error';
      }
    }
  </script>

</body>
</html>
