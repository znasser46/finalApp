<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
  <link rel="stylesheet" href="/styles/styles.css">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar navbar-dark bg-dark">
    <a class="navbar-brand" href="#">ZN|Budget</a>
  </nav>

  <div class="flex-container">
    <div class="explanation">
      <h1>Welcome to my Budget Tracker App!</h1>
    </div>
    <h2>Enter your name, income and monthly expenses below:</h2>

    <div class="form">
      <form id="budgetForm">
        <div class="main">
          <label for="name">Name:</label>
          <input type="text" id="name" required>

          <label for="income">Monthly Income:</label>
          <input type="number" id="income" required>
        </div>

        <label for="transportation">Transportation:</label>
        <input type="number" id="transportation" required>

        <label for="rent">Mortgage/rent:</label>
        <input type="number" id="rent" required>

        <label for="groceries">Food:</label>
        <input type="number" id="groceries" required>

        <label for="utility">Utility:</label>
        <input type="number" id="utility" required>

        <label for="household">household:</label>
        <input type="number" id="household" required>

        <label for="entertainment">Entertainment:</label>
        <input type="number" id="entertainment" required>

        <label for="clothes">Clothes:</label>
        <input type="number" id="clothes" required>

        <label for="healthcare">Healthcare:</label>
        <input type="number" id="healthcare" required>

        <div class="save"><button class="btn btn-dark" type="submit">Save Budget</button></div>

      </form>

    </div>
    
  </div>


  <div class="listContainer">
    <div class="listBG">
      <div id="message"></div>
      <h2>Saved Budgets:</h2>
      <div id="budgetList">Loading Budgets...</div>
    </div>
  </div>

  <footer class="navbar navbar-dark bg-dark">© Zachary Nasser 2026</footer>
</body>

<script src="/js/scripts.js"></script>
</html>
