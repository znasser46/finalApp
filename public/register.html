<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="/styles/styles.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar navbar-dark bg-dark">
        <a class="navbar-brand" href="#">ZN|Budget</a>
        <div id="authButtons" class="ms-auto d-flex gap-2">
            <div class="ms-auto d-flex gap-2">
                <a href="/register.html" class="btn btn-outline-light">
                    Register
                </a>
                <div class="ms-auto">
                    <a href="/login.html" class="btn btn-outline-light">
                        Login
                    </a>
                </div>
            </div>
    </nav>
    <div class="registerContainer" >
    <div class="registerBackground">
    <div class = "register">
  <h2>Register</h2>

  <div class="registerForms">
    <label>Username</label>
    <input id="username" placeholder="Username" class="form-control" />
  </div>

  <div class="registerForms">
    <label>Password</label>
    <input id="password" type="password" placeholder="Password" class="form-control" />
  </div>

   <button class="btn btn-dark registerButton" onclick="register()">Register</button>

  <p id="msg"></p>
  </div>

  </div>
  </div>

  <script>
    async function register() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (res.ok) {
        document.getElementById('msg').innerText = "Registered! Go to login.";
        setTimeout(() => window.location.href = '/login.html', 1000);
      } else {
        document.getElementById('msg').innerText = data.error;
      }
    }
  </script>
</body>
</html>
